spring.application.name=SmartClass-Scheduler

server.port = 8889

spring.ai.openai.api-key=${GROQ_AI_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.1-8b-instant
spring.ai.openai.chat.options.temperature=0.7

spring.datasource.url=jdbc:mysql://localhost:3306/SmartClassTime
spring.datasource.username=root
spring.datasource.password=admin@@

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


#logging configurations
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

#mcp server configurations
spring.ai.mcp.client.stdio.servers-configuration=classpath:servers.json